<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyebrak Settings</title>
<link rel="stylesheet" href="styles.css">
</head>
<body style="width: 450px; min-height: auto;">
<div class="container">
  <header>
    <h1>Settings</h1>
  </header>

  <div class="card">
    <h3>Reminder Mode</h3>
    <select id="mode">
      <option value="interval">Repeated Interval</option>
      <option value="one-time">One-Time</option>
      <option value="pomodoro">Pomodoro</option>
    </select>
  </div>

  <div class="card" id="intervalCard">
    <h3>Interval Settings</h3>
    <label>Reminder Interval (min)</label>
    <input type="number" id="interval" min="1" max="120">
  </div>

  <div class="card hidden" id="pomodoroCard">
    <h3>Pomodoro Settings</h3>
    <div style="margin-bottom: 12px;">
      <label>Work Duration (min)</label>
      <input type="number" id="pomodoroWork" min="5" max="120">
    </div>
    <div>
      <label>Break Duration (min)</label>
      <input type="number" id="pomodoroBreak" min="1" max="60">
    </div>
  </div>

  <div class="card">
    <h3>Notifications</h3>
    <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
      <input type="checkbox" id="enabled" style="width: auto; margin-top: 0;">
      <label for="enabled">Enable Desktop Notifications</label>
    </div>
  </div>

  <button id="saveBtn">Save Settings</button>
  <p id="status" style="text-align: center; color: var(--accent-color); font-size: 13px; font-weight: 600;"></p>
</div>
<script src="options.js"></script>
</body>
</html>
