<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eyebrak</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Eyebrak</h1>
  </header>

  <div class="card timer-container" id="timerCard">
    <div class="timer-circle">
      <div id="timer">--:--</div>
      <p id="timerLabel">Initializing...</p>
    </div>
  </div>

  <div class="card hidden" id="pomodoroCard">
    <div class="stat-row">
      <span>Phase</span>
      <span class="stat-value" id="phase">--</span>
    </div>
    <div class="stat-row">
      <span>Current Streak</span>
      <span class="stat-value" id="streak">0</span>
    </div>
  </div>

  <div class="flex-row">
    <button id="pauseBtn">
      <span id="pauseBtnText">Pause</span>
    </button>
  </div>

  <div class="flex-row">
    <button id="optionsBtn" class="secondary">Settings</button>
    <button id="statsBtn" class="secondary">Stats</button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
